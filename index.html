<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Worple</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="main-container">
            <div class="game-container">
                <div class="difficulty-selection">
                    <div class="difficulty-controls">
                        <label for="difficulty">Difficulty:</label>
                        <select id="difficulty">
                            <option value="0">Common Words Only</option>
                            <option value="1" selected>Most Words</option>
                            <option value="2">Gamer Rage</option>
                        </select>
                    </div>
                    <div
                        id="difficulty-message"
                        class="difficulty-info-message"
                    >
                        ℹ️ Changing difficulty resets the current game.
                    </div>
                </div>
                <div class="game-controls">
                    <button id="new-game-button" class="modal-button">
                        New Game
                    </button>
                </div>
                <h1>Worple</h1>
                <div id="game-board"></div>
                <div id="keyboard"></div>
            </div>
            <div id="sidebar">
                <h2>Statistics</h2>
                <div id="stats-content"></div>
                <h2>Recent Games</h2>
                <div id="recent-games-content"></div>
                <div id="pagination-controls">
                    <button id="prev-page-button">&laquo; Prev</button>
                    <span id="page-info"></span>
                    <button id="next-page-button">Next &raquo;</button>
                </div>
                <button id="clear-history-button" class="modal-button">
                    Clear History
                </button>
            </div>
        </div>
        <div id="modal-container">
            <div id="modal">
                <div id="modal-message"></div>
                <div id="modal-buttons-container">
                    <button id="modal-okay-button" class="modal-button">
                        Okay
                    </button>
                    <button id="play-again-button">Play Again</button>
                    <button id="modal-confirm-button" class="modal-button">
                        Confirm
                    </button>
                    <button id="modal-cancel-button" class="modal-button">
                        Cancel
                    </button>
                </div>
            </div>
        </div>
        <div id="temporary-message-container"></div>
        <script src="script.min.js"></script>
        <div class="github-link">
            <a
                href="https://github.com/wetherc/worple"
                target="_blank"
                rel="noopener noreferrer"
            >
                <svg
                    height="32"
                    aria-hidden="true"
                    viewBox="0 0 16 16"
                    version="1.1"
                    width="32"
                    data-view-component="true"
                    class="octicon octicon-mark-github v-align-middle"
                >
                    <path
                        fill-rule="evenodd"
                        d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"
                    ></path>
                </svg>
            </a>
        </div>
    </body>
</html>
